{{- if .Values.beat.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fastapi-celery.fullname" . }}-beat
  labels:
    {{- include "fastapi-celery.labels" . | nindent 4 }}
    app.kubernetes.io/component: beat
spec:
  replicas: {{ .Values.beat.replicas }}
  selector:
    matchLabels:
      {{- include "fastapi-celery.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: beat
  template:
    metadata:
      labels:
        {{- include "fastapi-celery.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: beat
    spec:
      {{- include "fastapi-celery.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: beat
          image: "{{ .Values.images.beat.repository }}:{{ .Values.images.beat.tag }}"
          imagePullPolicy: {{ .Values.images.beat.pullPolicy }}
          command: ["celery"]
          args:
            - -A
            - app.celery_app
            - beat
            - --loglevel=info
            - --scheduler=celery.beat:Scheduler
          env:
            - name: CELERY_BROKER_URL
              value: redis://{{ include "fastapi-celery.fullname" . }}-redis:6379/0
          resources:
            {{- toYaml .Values.beat.resources | nindent 12 }}
{{- end }}

{{- if .Values.flower.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fastapi-celery.fullname" . }}-flower
  labels:
    {{- include "fastapi-celery.labels" . | nindent 4 }}
    app.kubernetes.io/component: flower
spec:
  replicas: {{ .Values.flower.replicas }}
  selector:
    matchLabels:
      {{- include "fastapi-celery.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: flower
  template:
    metadata:
      labels:
        {{- include "fastapi-celery.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: flower
    spec:
      {{- include "fastapi-celery.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: flower
          image: "{{ .Values.images.flower.repository }}:{{ .Values.images.flower.tag }}"
          imagePullPolicy: {{ .Values.images.flower.pullPolicy }}
          args:
            - celery
            - --broker=redis://{{ include "fastapi-celery.fullname" . }}-redis:6379/0
            - flower
          ports:
            - containerPort: 5555
          readinessProbe:
            httpGet:
              path: /
              port: 5555
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 5555
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.flower.resources | nindent 12 }}
{{- end }}

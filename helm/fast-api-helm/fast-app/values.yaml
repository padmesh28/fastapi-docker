# =====================================================
# Images (LOCAL Docker images)
# =====================================================
nameOverride: ""
fullnameOverride: ""

images:
  api:
    repository: fastapi-api
    tag: latest
    pullPolicy: IfNotPresent

  worker:
    repository: fastapi-worker
    tag: latest
    pullPolicy: IfNotPresent

  beat:
    repository: fastapi-beat
    tag: latest
    pullPolicy: IfNotPresent

  flower:
    repository: mher/flower
    tag: "2.0"
    pullPolicy: IfNotPresent

# Optional image pull secrets for private registries (OpenShift/Kubernetes)
# Example:
# imagePullSecrets:
#   - my-registry-secret
imagePullSecrets: []


# =====================================================
# FastAPI
# =====================================================
api:
  replicas: 1
  service:
    type: ClusterIP
    port: 8000
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: api.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  route:
    enabled: false
    host: ""
    path: /
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
    annotations: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi


# =====================================================
# Celery Worker
# =====================================================
worker:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi


# =====================================================
# Celery Beat
# =====================================================
beat:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 128Mi


# =====================================================
# Flower
# =====================================================
flower:
  enabled: true
  replicas: 1
  service:
    type: ClusterIP
    port: 5555
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: flower.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  route:
    enabled: false
    host: ""
    path: /
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
    annotations: {}
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 128Mi


# =====================================================
# Redis (OFFICIAL Redis image via Deployment)
# =====================================================
redis:
  enabled: true
  replicas: 1
  image:
    repository: redis
    tag: "7"
    pullPolicy: IfNotPresent
  service:
    port: 6379
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
